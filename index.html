<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Performance — Project Board</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --purple: #bc8cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; }
  
  header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:20px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .tabs { display:flex; gap:8px; margin-left:auto; }
  .tab { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:14px; font-weight:500; transition:all .2s; }
  .tab:hover { color:var(--text); border-color:var(--muted); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  
  .stats-bar { padding:16px 32px; display:flex; gap:24px; border-bottom:1px solid var(--border); }
  .stat { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
  .stat .dot { width:10px; height:10px; border-radius:50%; }
  .stat .count { color:var(--text); font-weight:600; }
  
  .board { padding:24px 32px; display:none; }
  .board.active { display:block; }
  
  .columns { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .column { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
  .col-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .col-header h3 { font-size:14px; font-weight:600; }
  .col-header .badge { font-size:12px; background:var(--border); color:var(--muted); padding:2px 8px; border-radius:10px; }
  .col-body { padding:8px; min-height:200px; }
  
  .task-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px; margin:8px 0; cursor:pointer; transition:all .2s; }
  .task-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .task-card.dragging { opacity:0.4; }
  .task-title { font-size:14px; font-weight:600; margin-bottom:6px; }
  .task-meta { display:flex; gap:8px; flex-wrap:wrap; }
  .tag { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:500; }
  .tag.critical { background:rgba(248,81,73,.15); color:var(--red); }
  .tag.high { background:rgba(219,109,40,.15); color:var(--orange); }
  .tag.medium { background:rgba(210,153,34,.15); color:var(--yellow); }
  .tag.low { background:rgba(63,185,80,.15); color:var(--green); }
  .tag.speed { background:rgba(88,166,255,.15); color:var(--accent); }
  .tag.seo { background:rgba(188,140,255,.15); color:var(--purple); }
  .task-impact { font-size:12px; color:var(--muted); margin-top:8px; }
  
  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; width:640px; max-width:95vw; max-height:85vh; overflow-y:auto; }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h2 { font-size:18px; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer; padding:4px 8px; border-radius:4px; }
  .modal-close:hover { color:var(--text); background:var(--border); }
  .modal-body { padding:24px; }
  .modal-body h4 { color:var(--accent); font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin:16px 0 8px; }
  .modal-body h4:first-child { margin-top:0; }
  .modal-body p, .modal-body li { font-size:14px; line-height:1.6; color:var(--muted); }
  .modal-body ul { padding-left:20px; }
  .modal-body li { margin:4px 0; }
  .modal-body .expected { background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.2); border-radius:8px; padding:12px 16px; margin:12px 0; }
  .modal-body .expected span { color:var(--green); font-weight:600; }
  .modal-body .risk { background:rgba(210,153,34,.1); border:1px solid rgba(210,153,34,.2); border-radius:8px; padding:12px 16px; margin:12px 0; }
  .modal-body .risk span { color:var(--yellow); font-weight:600; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .btn { padding:8px 20px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:1px solid var(--border); transition:all .15s; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.15); }
  .btn-success { background:var(--green); color:#fff; border-color:var(--green); }
  .btn-success:hover { filter:brightness(1.15); }
  .btn-outline { background:transparent; color:var(--text); }
  .btn-outline:hover { background:var(--border); }
  .btn-move { background:transparent; color:var(--yellow); border-color:var(--yellow); }
  .btn-move:hover { background:rgba(210,153,34,.15); }
  
  .benchmark-bar { margin-top:12px; }
  .benchmark-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
  .benchmark-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .benchmark-fill { height:100%; border-radius:3px; transition:width .5s ease; }
  
  .site-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .site-header .site-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .site-header .site-info h2 { font-size:18px; }
  .site-header .site-info p { font-size:13px; color:var(--muted); }
  .site-baseline { display:flex; gap:20px; margin-bottom:20px; }
  .baseline-card { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px; }
  .baseline-card .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .baseline-card .value { font-size:24px; font-weight:700; margin-top:4px; }
  .baseline-card .value.bad { color:var(--red); }
  .baseline-card .value.ok { color:var(--yellow); }
  .baseline-card .value.good { color:var(--green); }
</style>
</head>
<body>

<header>
  <h1>⚡ <span>Site Performance</span> — Project Board</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchBoard('crown')">👑 Crown Office</button>
    <button class="tab" onclick="switchBoard('shirtsy')">👕 Shirtsy</button>
    <button class="tab" onclick="switchBoard('goodneon')">💡 GoodNeon</button>
    <button class="tab" onclick="switchBoard('lux')">✨ Lux Neon</button>
  </div>
</header>

<div id="board-crown" class="board active"></div>
<div id="board-shirtsy" class="board"></div>
<div id="board-goodneon" class="board"></div>
<div id="board-lux" class="board"></div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const projects = {
  crown: {
    name: "Crown Office Supplies",
    icon: "👑",
    url: "crownofficesupplies.com",
    baseline: { ttfb: "1,139ms", total: "1,207ms", size: "353 KB", platform: "WordPress + WooCommerce" },
    tasks: [
      {
        id: "crown-1",
        title: "Install WP Caching Plugin",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "TTFB from 1.1s → ~0.2s (5x faster)",
        description: "The origin server takes 1.1 seconds to respond because WordPress generates every page from scratch. A caching plugin stores pre-built HTML so the server responds instantly.",
        steps: [
          "Log into WordPress admin → Plugins → Add New",
          "Search for 'LiteSpeed Cache' or 'WP Rocket' (paid, but best) or 'W3 Total Cache' (free)",
          "Install and activate the plugin",
          "Enable Page Cache in plugin settings",
          "Enable Object Cache if Redis/Memcached is available on hosting",
          "Enable Browser Cache",
          "Test: visit the homepage twice — second load should be under 300ms"
        ],
        expected: "TTFB drops from 1.1s to under 0.2s. This is the single biggest win.",
        risk: "Low risk. Caching plugins are standard WP practice. If something looks broken, deactivate the plugin to instantly revert."
      },
      {
        id: "crown-2",
        title: "Fix Cloudflare Cache Settings",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "Edge-cached pages load in ~50ms globally",
        description: "Cloudflare is in front of Crown but cf-cache-status shows DYNAMIC — it's not caching HTML pages. Visitors hit the origin server every time, defeating the purpose of having a CDN.",
        steps: [
          "Log into Cloudflare dashboard → select crownofficesupplies.com",
          "Go to Rules → Page Rules (or Cache Rules if on new UI)",
          "Add rule: URL pattern crownofficesupplies.com/* → Cache Level: Cache Everything, Edge TTL: 2 hours",
          "Add exception rule for /wp-admin/* and /cart/* and /checkout/* → Cache Level: Bypass",
          "Go to Speed → Optimization → enable Auto Minify (JS, CSS, HTML)",
          "Enable Brotli compression if not already on",
          "Purge cache after setting up: Caching → Purge Everything"
        ],
        expected: "Static pages served from Cloudflare edge (~50ms). Dynamic pages (cart, checkout, admin) still hit origin.",
        risk: "Medium risk. Must exclude logged-in pages, cart, and checkout from caching or customers will see stale/other users' data. Test checkout flow after enabling."
      },
      {
        id: "crown-3",
        title: "Optimize Product Images",
        priority: "high",
        category: "speed",
        status: "todo",
        impact: "Page weight reduced 40-60%, faster mobile loads",
        description: "Homepage is 353KB HTML alone. With images it's likely 2-5MB. Unoptimized product images are a major drag on mobile performance and hurt Core Web Vitals (LCP).",
        steps: [
          "Install 'ShortPixel' or 'Smush' plugin in WordPress",
          "Run bulk optimization on all existing media library images",
          "Enable WebP conversion (modern format, 25-35% smaller)",
          "Enable lazy loading for below-the-fold images",
          "Set max upload dimensions (e.g., 1200px wide for product images)",
          "Check: homepage total page weight should drop below 1.5MB"
        ],
        expected: "40-60% reduction in image weight. Faster mobile loads, better Core Web Vitals scores.",
        risk: "Low risk. Plugins keep originals. WebP serves modern format to supported browsers, falls back to JPEG/PNG for older ones."
      },
      {
        id: "crown-4",
        title: "Clean Up Category Taxonomy",
        priority: "high",
        category: "seo",
        status: "todo",
        impact: "Better SEO, less HTML bloat, cleaner navigation",
        description: "Products are tagged in 10-15+ categories each (e.g., a ruler is in General Office Supplies, All Arts & Crafts, All Office, All Products, All School, Back To School, Desk Essentials, Gift Ideas, Gifts, Home School, Office Accessories, Office Supplies, School Accessories, Stationary). This creates duplicate content issues, confuses Google, and bloats the HTML.",
        steps: [
          "Export product catalog as CSV for backup",
          "Audit all categories — identify redundant/overlapping ones",
          "Remove 'All Products', 'All Office', 'All School', 'All Arts & Crafts' categories (these can be replaced with shop page filters)",
          "Limit each product to 2-3 relevant categories max",
          "Set up proper parent/child category hierarchy instead of flat tags",
          "Set up 301 redirects for any removed category URLs",
          "Submit updated sitemap to Google Search Console"
        ],
        expected: "Cleaner URL structure, less duplicate content, better crawl budget allocation. HTML size reduction on listing pages.",
        risk: "Medium risk. Removing categories changes URLs. Must set up 301 redirects or you'll lose any existing SEO value on those pages. Back up first."
      },
      {
        id: "crown-5",
        title: "Add Security Headers",
        priority: "medium",
        category: "seo",
        status: "todo",
        impact: "Better security posture, potential SEO trust signal",
        description: "Crown has zero security headers compared to Lux (Shopify), which has CSP, HSTS, XSS Protection, X-Content-Type-Options, and more. Missing headers can flag security scanners and erode trust.",
        steps: [
          "In Cloudflare, go to SSL/TLS → Edge Certificates → enable HSTS",
          "Set HSTS max-age to at least 6 months (15768000)",
          "Add Transform Rule or Worker to inject headers: X-Content-Type-Options: nosniff, X-Frame-Options: SAMEORIGIN, Referrer-Policy: strict-origin-when-cross-origin",
          "Or add headers via .htaccess / wp-config if preferred",
          "Test with securityheaders.com after applying"
        ],
        expected: "A+ rating on securityheaders.com. Better trust signals for browsers and search engines.",
        risk: "Low risk. These are standard headers. HSTS should only be enabled once you're sure SSL is working correctly everywhere."
      },
      {
        id: "crown-6",
        title: "Enable GZIP/Brotli Compression",
        priority: "medium",
        category: "speed",
        status: "todo",
        impact: "30-40% smaller transfer size",
        description: "Verify that Brotli or GZIP compression is active. Cloudflare should handle this but it's worth confirming the origin also compresses responses.",
        steps: [
          "Cloudflare dashboard → Speed → Optimization → enable Brotli",
          "Check WordPress: ensure mod_deflate or mod_gzip is enabled on the server",
          "Or add to .htaccess: AddOutputFilterByType DEFLATE text/html text/css application/javascript",
          "Verify with curl -sI -H 'Accept-Encoding: gzip' https://crownofficesupplies.com | grep content-encoding"
        ],
        expected: "HTML, CSS, JS transferred at 30-40% smaller size. Faster page loads especially on slower connections.",
        risk: "Very low risk. Standard web optimization."
      }
    ]
  },
  shirtsy: {
    name: "Shirtsy",
    icon: "👕",
    url: "shirtsy.com",
    baseline: { ttfb: "~1.8s", total: "~1.8s", size: "N/A", platform: "WordPress + WooCommerce" },
    tasks: [
      {
        id: "shirtsy-1",
        title: "Fix Cloudflare BYPASS Issue",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "Currently Cloudflare is actively refusing to cache — fixing this alone is huge",
        description: "Shirtsy's Cloudflare returns cf-cache-status: BYPASS, which means there's an active rule or plugin telling Cloudflare NOT to cache. This is worse than Crown's DYNAMIC status — someone explicitly configured it to bypass.",
        steps: [
          "Log into Cloudflare dashboard → select shirtsy.com",
          "Check Rules → Page Rules for any 'Cache Level: Bypass' rules",
          "Check if a WordPress plugin (e.g., WP Cloudflare Super Page Cache, W3TC) is sending no-cache headers",
          "Check WP plugin settings for any 'bypass cache' or 'development mode' toggles",
          "Look for Cache-Control headers being set by WP plugins (currently seeing public, max-age=300 but CF ignores it)",
          "Remove or fix the bypass rule",
          "Test: curl -sI https://shirtsy.com | grep cf-cache → should show HIT after second request"
        ],
        expected: "Cloudflare starts actually caching pages. TTFB on cached pages drops to ~50ms.",
        risk: "Medium risk. Need to identify WHY bypass was set — it may have been intentional (e.g., to avoid caching logged-in user pages). Must ensure cart/checkout/admin are excluded."
      },
      {
        id: "shirtsy-2",
        title: "Install WP Caching Plugin",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "Origin response time from ~1.5s → ~0.2s",
        description: "Even after fixing Cloudflare, the origin server needs to be fast for cache misses, admin pages, and dynamic content. WordPress is generating pages from scratch on every request.",
        steps: [
          "Log into WordPress admin → Plugins → Add New",
          "Install LiteSpeed Cache (if on LiteSpeed server) or WP Super Cache / W3 Total Cache (free) or WP Rocket (paid, best)",
          "Enable Page Cache",
          "Enable Object Cache if Redis/Memcached available",
          "Enable Browser Cache headers",
          "Configure cache exclusions: /cart/*, /checkout/*, /my-account/*",
          "Test: visit homepage twice, second load should be under 300ms TTFB"
        ],
        expected: "Uncached/origin page loads drop from ~1.5s to ~0.2s TTFB.",
        risk: "Low risk. Standard WP optimization. Exclude dynamic pages from cache."
      },
      {
        id: "shirtsy-3",
        title: "Audit & Reduce Plugin Load",
        priority: "high",
        category: "speed",
        status: "todo",
        impact: "Reduce server processing time and JS/CSS bloat",
        description: "WooCommerce sites often accumulate 20-40+ plugins. Each plugin adds PHP execution time on the server and potentially JS/CSS on the frontend. This is likely a contributing factor to the slow TTFB.",
        steps: [
          "Log into WordPress admin → Plugins → Installed Plugins",
          "List all active plugins and their purpose",
          "Identify redundant plugins (e.g., multiple SEO plugins, unused page builders)",
          "Deactivate plugins one at a time and test TTFB after each",
          "Remove any plugin that doesn't serve a clear purpose",
          "Consider replacing heavy plugins with lightweight alternatives",
          "Use Query Monitor plugin to identify slow database queries from plugins"
        ],
        expected: "Reduced server processing time. Fewer HTTP requests. Lighter page weight.",
        risk: "Medium risk. Deactivate one at a time and test. Some plugins may have dependencies."
      },
      {
        id: "shirtsy-4",
        title: "Optimize Images & Enable Lazy Loading",
        priority: "high",
        category: "speed",
        status: "todo",
        impact: "Faster visual load, better mobile experience",
        description: "Product images on WooCommerce sites are often uploaded at full resolution without optimization. Combined with no lazy loading, the browser downloads all images upfront.",
        steps: [
          "Install ShortPixel or Smush plugin",
          "Bulk optimize all existing product images",
          "Enable WebP conversion",
          "Enable lazy loading (WordPress 5.5+ has native lazy loading, but plugins do it better)",
          "Set reasonable max image dimensions (1200px product, 600px thumbnails)",
          "Verify with Lighthouse: check LCP and image-related suggestions"
        ],
        expected: "Page weight drops significantly. LCP (Largest Contentful Paint) improves. Mobile speed score jumps.",
        risk: "Low risk. Originals preserved. Reversible."
      },
      {
        id: "shirtsy-5",
        title: "Set Up Cloudflare Page Rules",
        priority: "medium",
        category: "speed",
        status: "todo",
        impact: "Global edge caching for static pages",
        description: "After fixing the BYPASS issue, set up proper page rules to cache static content at the edge while keeping dynamic pages (cart, checkout, account) fresh.",
        steps: [
          "Cloudflare → Rules → Page Rules",
          "Rule 1: shirtsy.com/wp-admin/* → Cache Level: Bypass",
          "Rule 2: shirtsy.com/cart/* → Cache Level: Bypass",
          "Rule 3: shirtsy.com/checkout/* → Cache Level: Bypass",
          "Rule 4: shirtsy.com/my-account/* → Cache Level: Bypass",
          "Rule 5: shirtsy.com/* → Cache Level: Cache Everything, Edge TTL: 2 hours",
          "Enable Auto Minify (JS, CSS, HTML) in Speed settings",
          "Purge full cache after setup"
        ],
        expected: "Product pages, homepage, category pages all served from Cloudflare edge globally. Cache misses still hit the (now-cached) origin.",
        risk: "Medium risk. Order of page rules matters (most specific first). Test checkout flow thoroughly."
      },
      {
        id: "shirtsy-6",
        title: "Add Security Headers",
        priority: "low",
        category: "seo",
        status: "todo",
        impact: "Better security posture, trust signals",
        description: "Like Crown, Shirtsy is missing standard security headers. Not urgent but good practice.",
        steps: [
          "Enable HSTS in Cloudflare SSL/TLS settings",
          "Add security headers via Cloudflare Transform Rules or .htaccess",
          "Headers to add: X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Permissions-Policy",
          "Verify at securityheaders.com"
        ],
        expected: "Improved security score. Standard best practice.",
        risk: "Low risk."
      }
    ]
  },
  goodneon: {
    name: "GoodNeon",
    icon: "💡",
    url: "goodneon.com",
    baseline: { ttfb: "~2.7s (peak)", total: "0.3s–2.7s", size: "150 KB", platform: "WordPress" },
    tasks: [
      {
        id: "goodneon-1",
        title: "Fix Cache-Control Header (max-age=3)",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "Pages currently expire every 3 SECONDS — fixing this is the #1 priority",
        description: "GoodNeon has the worst cache configuration of all four sites. The Cache-Control header is set to max-age=3, must-revalidate — meaning every page expires after just 3 seconds. This makes caching completely useless. Every visitor effectively hits the origin server on every request.",
        steps: [
          "Log into WordPress admin for goodneon.com",
          "Check which plugin or theme is setting Cache-Control: max-age=3",
          "Common culprits: WooCommerce, caching plugins in 'development mode', or custom code in functions.php",
          "Search wp-content/themes/*/functions.php and wp-content/plugins/*/includes/ for 'max-age=3' or 'must-revalidate'",
          "Change to Cache-Control: public, max-age=3600, s-maxage=7200 (1hr browser, 2hr CDN)",
          "Or install a proper caching plugin (WP Rocket, LiteSpeed Cache) which will set correct headers automatically",
          "Verify: curl -sI https://goodneon.com | grep cache-control → should show max-age=3600 or higher"
        ],
        expected: "Pages cached for 1+ hours instead of 3 seconds. Massive reduction in origin server load. Consistent fast response times.",
        risk: "Low risk. The current value is broken — almost any change is an improvement. Test product pages and cart/checkout after changing."
      },
      {
        id: "goodneon-2",
        title: "Install WP Caching Plugin",
        priority: "critical",
        category: "speed",
        status: "todo",
        impact: "Origin TTFB from variable ~2.7s → consistent ~0.2s",
        description: "GoodNeon's response time swings wildly from 0.3s to 2.7s, which means the WordPress origin has no page caching. When the server is under any load, it tanks. A caching plugin stores pre-built HTML pages.",
        steps: [
          "Log into WordPress admin → Plugins → Add New",
          "Install LiteSpeed Cache (if on LiteSpeed server) or WP Rocket (paid, best) or W3 Total Cache (free)",
          "Enable Page Cache in plugin settings",
          "Enable Object Cache if Redis/Memcached is available",
          "Enable Browser Cache",
          "Configure cache exclusions: /cart/*, /checkout/*, /my-account/*",
          "Test: visit homepage 3 times — response should be consistent under 300ms"
        ],
        expected: "Eliminates the wild TTFB swings. Consistent sub-300ms origin responses. This plus fixing cache-control will transform the site.",
        risk: "Low risk. Standard WordPress optimization. Will likely also fix the cache-control issue if the current bad header is coming from a misconfigured plugin."
      },
      {
        id: "goodneon-3",
        title: "Enable Cloudflare Edge Caching",
        priority: "high",
        category: "speed",
        status: "todo",
        impact: "Global edge-cached pages in ~50ms",
        description: "Cloudflare is in front of GoodNeon but cf-cache-status shows DYNAMIC — it's passing everything through to the origin. Combined with the 3-second cache-control, Cloudflare has nothing to work with.",
        steps: [
          "Log into Cloudflare dashboard → select goodneon.com",
          "Go to Rules → Page Rules (or Cache Rules)",
          "Add bypass rules first: goodneon.com/wp-admin/* → Bypass, goodneon.com/cart/* → Bypass, goodneon.com/checkout/* → Bypass, goodneon.com/my-account/* → Bypass",
          "Add catch-all: goodneon.com/* → Cache Level: Cache Everything, Edge TTL: 2 hours",
          "Enable Auto Minify (JS, CSS, HTML) in Speed settings",
          "Enable Brotli compression",
          "Purge cache: Caching → Purge Everything"
        ],
        expected: "Static pages served from Cloudflare edge globally (~50ms). Only dynamic pages hit origin.",
        risk: "Medium risk. Must exclude cart, checkout, and logged-in pages. Test the full purchase flow after enabling."
      },
      {
        id: "goodneon-4",
        title: "Optimize Product Images",
        priority: "high",

// State
let taskStates = {};
try { taskStates = JSON.parse(localStorage.getItem('perf-board-states') || '{}'); } catch(e) {}

function saveStates() {
  localStorage.setItem('perf-board-states', JSON.stringify(taskStates));
}

function getStatus(id) { return taskStates[id] || 'todo'; }
function setStatus(id, status) { taskStates[id] = status; saveStates(); }

function renderBoard(key) {
  const proj = projects[key];
  const board = document.getElementById(`board-${key}`);
  
  const todo = proj.tasks.filter(t => getStatus(t.id) === 'todo');
  const inProgress = proj.tasks.filter(t => getStatus(t.id) === 'in-progress');
  const done = proj.tasks.filter(t => getStatus(t.id) === 'done');
  
  let html = `
    <div class="site-header">
      <div class="site-icon" style="background:var(--card);border:1px solid var(--border);">${proj.icon}</div>
      <div class="site-info">
        <h2>${proj.name}</h2>
        <p>${proj.url} · ${proj.baseline.platform}</p>
      </div>
    </div>
    <div class="site-baseline">
      <div class="baseline-card">
        <div class="label">TTFB (Baseline)</div>
        <div class="value bad">${proj.baseline.ttfb}</div>
      </div>
      <div class="baseline-card">
        <div class="label">Total Load</div>
        <div class="value bad">${proj.baseline.total}</div>
      </div>
      <div class="baseline-card">
        <div class="label">Page Size</div>
        <div class="value ok">${proj.baseline.size}</div>
      </div>
      <div class="baseline-card">
        <div class="label">Tasks Done</div>
        <div class="value ${done.length === proj.tasks.length ? 'good' : ''}">${done.length}/${proj.tasks.length}</div>
      </div>
    </div>
    <div class="columns">
      <div class="column">
        <div class="col-header">
          <h3>📋 To Do</h3>
          <span class="badge">${todo.length}</span>
        </div>
        <div class="col-body">${todo.map(t => taskCard(t)).join('')}</div>
      </div>
      <div class="column">
        <div class="col-header">
          <h3>🔧 In Progress</h3>
          <span class="badge">${inProgress.length}</span>
        </div>
        <div class="col-body">${inProgress.map(t => taskCard(t)).join('')}</div>
      </div>
      <div class="column">
        <div class="col-header">
          <h3>✅ Done</h3>
          <span class="badge">${done.length}</span>
        </div>
        <div class="col-body">${done.map(t => taskCard(t)).join('')}</div>
      </div>
    </div>
  `;
  board.innerHTML = html;
}

function taskCard(t) {
  const status = getStatus(t.id);
  return `
    <div class="task-card" onclick="openTask('${t.id}')">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">
        <span class="tag ${t.priority}">${t.priority}</span>
        <span class="tag ${t.category}">${t.category}</span>
      </div>
      <div class="task-impact">⚡ ${t.impact}</div>
    </div>
  `;
}

function findTask(id) {
  for (const key of Object.keys(projects)) {
    const t = projects[key].tasks.find(t => t.id === id);
    if (t) return t;
  }
}

function openTask(id) {
  const t = findTask(id);
  if (!t) return;
  const status = getStatus(id);
  
  document.getElementById('modal-title').textContent = t.title;
  document.getElementById('modal-body').innerHTML = `
    <h4>What's Wrong</h4>
    <p>${t.description}</p>
    
    <h4>Steps to Fix</h4>
    <ol>${t.steps.map(s => `<li>${s}</li>`).join('')}</ol>
    
    <div class="expected">
      <span>Expected Result:</span> ${t.expected}
    </div>
    
    <div class="risk">
      <span>Risk Level:</span> ${t.risk}
    </div>
  `;
  
  let footerHtml = '';
  if (status === 'todo') {
    footerHtml = `
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="moveTask('${id}','in-progress')">▶ Start Task</button>
    `;
  } else if (status === 'in-progress') {
    footerHtml = `
      <button class="btn btn-outline" onclick="moveTask('${id}','todo')">↩ Back to To Do</button>
      <button class="btn btn-success" onclick="moveTask('${id}','done')">✅ Mark Done</button>
    `;
  } else {
    footerHtml = `
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
      <button class="btn btn-move" onclick="moveTask('${id}','todo')">↩ Reopen</button>
    `;
  }
  document.getElementById('modal-footer').innerHTML = footerHtml;
  document.getElementById('modal').classList.add('open');
}

function moveTask(id, status) {
  setStatus(id, status);
  closeModal();
  renderBoard('crown');
  renderBoard('shirtsy');
  renderBoard('goodneon');
  renderBoard('lux');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function switchBoard(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.board').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`board-${key}`).classList.add('active');
}

// Keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Initial render
renderBoard('crown');
renderBoard('shirtsy');
renderBoard('goodneon');
renderBoard('lux');
</script>
