<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Dashboard — Project Board</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #db6d28;
    --purple: #bc8cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; }
  
  header { padding:24px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:20px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .tabs { display:flex; gap:8px; margin-left:auto; }
  .tab { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:14px; font-weight:500; transition:all .2s; }
  .tab:hover { color:var(--text); border-color:var(--muted); }
  .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  
  .stats-bar { padding:16px 32px; display:flex; gap:24px; border-bottom:1px solid var(--border); }
  .stat { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); }
  .stat .dot { width:10px; height:10px; border-radius:50%; }
  .stat .count { color:var(--text); font-weight:600; }
  
  .board { padding:24px 32px; display:none; }
  .board.active { display:block; }
  
  /* Lex Personal To Do — always visible */
  .lex-todo-section { background:var(--card); border:2px solid #8847ff; border-radius:12px; margin-bottom:20px; overflow:hidden; }
  .lex-todo-section .col-header { border-bottom:1px solid #8847ff33; }
  .lex-todo-section .col-header h3 { color:#bc8cff; }
  .lex-todo-section .col-body { display:flex; flex-wrap:wrap; gap:8px; padding:12px; min-height:auto; }
  .lex-todo-section .col-body .task-card { flex:1 1 280px; max-width:400px; margin:0; }
  .lex-todo-section .empty-msg { color:var(--muted); font-size:13px; padding:8px 4px; }
  .columns { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
  .column { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
  .col-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .col-header h3 { font-size:14px; font-weight:600; }
  .col-header .badge { font-size:12px; background:var(--border); color:var(--muted); padding:2px 8px; border-radius:10px; }
  .col-body { padding:8px; min-height:200px; }
  
  .task-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px; margin:8px 0; cursor:pointer; transition:all .2s; }
  .task-card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .task-card.dragging { opacity:0.4; }
  .task-title { font-size:14px; font-weight:600; margin-bottom:6px; }
  .task-meta { display:flex; gap:8px; flex-wrap:wrap; }
  .tag { font-size:11px; padding:2px 8px; border-radius:4px; font-weight:500; }
  .tag.critical { background:rgba(248,81,73,.15); color:var(--red); }
  .tag.high { background:rgba(219,109,40,.15); color:var(--orange); }
  .tag.medium { background:rgba(210,153,34,.15); color:var(--yellow); }
  .tag.low { background:rgba(63,185,80,.15); color:var(--green); }
  .tag.speed { background:rgba(88,166,255,.15); color:var(--accent); }
  .tag.seo { background:rgba(188,140,255,.15); color:var(--purple); }
  .task-impact { font-size:12px; color:var(--muted); margin-top:8px; }
  
  /* Modal */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; width:640px; max-width:95vw; max-height:85vh; overflow-y:auto; }
  .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .modal-header h2 { font-size:18px; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer; padding:4px 8px; border-radius:4px; }
  .modal-close:hover { color:var(--text); background:var(--border); }
  .modal-body { padding:24px; }
  .modal-body h4 { color:var(--accent); font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin:16px 0 8px; }
  .modal-body h4:first-child { margin-top:0; }
  .modal-body p, .modal-body li { font-size:14px; line-height:1.6; color:var(--muted); }
  .modal-body ul { padding-left:20px; }
  .modal-body li { margin:4px 0; }
  .modal-body .expected { background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.2); border-radius:8px; padding:12px 16px; margin:12px 0; }
  .modal-body .expected span { color:var(--green); font-weight:600; }
  .modal-body .risk { background:rgba(210,153,34,.1); border:1px solid rgba(210,153,34,.2); border-radius:8px; padding:12px 16px; margin:12px 0; }
  .modal-body .risk span { color:var(--yellow); font-weight:600; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .btn { padding:8px 20px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:1px solid var(--border); transition:all .15s; }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { filter:brightness(1.15); }
  .btn-success { background:var(--green); color:#fff; border-color:var(--green); }
  .btn-success:hover { filter:brightness(1.15); }
  .btn-outline { background:transparent; color:var(--text); }
  .btn-outline:hover { background:var(--border); }
  .btn-move { background:transparent; color:var(--yellow); border-color:var(--yellow); }
  .btn-move:hover { background:rgba(210,153,34,.15); }
  .btn-execute { background:rgba(255,123,0,.15); color:#ff7b00; border-color:#ff7b00; }
  .btn-execute:hover { background:rgba(255,123,0,.3); }
  .execute-glow { animation: glow 2s ease-in-out infinite alternate; }
  @keyframes glow { from { box-shadow:0 0 5px rgba(255,123,0,.2); } to { box-shadow:0 0 15px rgba(255,123,0,.4); } }
  .lex-glow { animation: lexglow 2s ease-in-out infinite alternate; }
  @keyframes lexglow { from { box-shadow:0 0 5px rgba(136,71,255,.2); } to { box-shadow:0 0 15px rgba(136,71,255,.4); } }
  .lex-tag { background:rgba(136,71,255,.15); color:#8847ff; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; }
  .lex-card { border-left:3px solid #8847ff; }
  .lex-card .task-title { font-size:13px; }
  .lex-card .task-desc { font-size:12px; color:var(--muted); margin-top:4px; line-height:1.4; }
  .toast { position:fixed; bottom:24px; right:24px; background:#1f6feb; color:#fff; padding:14px 24px; border-radius:10px; font-size:14px; font-weight:500; z-index:200; opacity:0; transform:translateY(20px); transition:all .3s ease; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  
  /* Mobile Responsive */
  @media (max-width: 1200px) {
    .columns { grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width: 1024px) {
    .columns { grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width: 768px) {
    header { padding:16px; flex-direction:column; align-items:flex-start; gap:12px; }
    header h1 { font-size:17px; }
    .tabs { margin-left:0; gap:6px; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; padding-bottom:4px; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { padding:8px 14px; font-size:12px; flex:0 0 auto; text-align:center; white-space:nowrap; }
    .board { padding:16px; }
    .columns { grid-template-columns:1fr; gap:12px; }
    .col-body { min-height:auto; }
    .lex-todo-section .col-body { flex-direction:column; }
    .lex-todo-section .col-body .task-card { max-width:100%; }
    .site-header { flex-direction:column; align-items:flex-start; gap:8px; }
    .site-baseline { flex-wrap:wrap; gap:10px; }
    .baseline-card { flex:1 1 45%; min-width:120px; }
    .baseline-card .value { font-size:20px; }
    .task-card { padding:12px; }
    .task-title { font-size:13px; }
    .task-impact { font-size:11px; }
    .modal { border-radius:12px; max-height:90vh; margin:16px; }
    .modal-header { padding:16px; }
    .modal-header h2 { font-size:16px; }
    .modal-body { padding:16px; }
    .modal-body p, .modal-body li { font-size:13px; }
    .modal-footer { padding:12px 16px; flex-wrap:wrap; }
    .btn { padding:10px 16px; font-size:13px; flex:1; text-align:center; }
    .toast { bottom:16px; right:16px; left:16px; text-align:center; }
  }
  @media (max-width: 400px) {
    .tabs { gap:4px; }
    .tab { padding:5px 8px; font-size:11px; }
    .baseline-card { flex:1 1 100%; }
    header h1 { font-size:15px; }
  }
  
  .benchmark-bar { margin-top:12px; }
  .benchmark-label { font-size:12px; color:var(--muted); margin-bottom:4px; }
  .benchmark-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .benchmark-fill { height:100%; border-radius:3px; transition:width .5s ease; }
  
  .site-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .site-header .site-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .site-header .site-info h2 { font-size:18px; }
  .site-header .site-info p { font-size:13px; color:var(--muted); }
  .site-baseline { display:flex; gap:20px; margin-bottom:20px; }
  .baseline-card { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:14px; }
  .baseline-card .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .baseline-card .value { font-size:24px; font-weight:700; margin-top:4px; }
  .baseline-card .value.bad { color:var(--red); }
  .baseline-card .value.ok { color:var(--yellow); }
  .baseline-card .value.good { color:var(--green); }

  /* ── Google Ads Dashboard ────────────────────────────── */
  .gads-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .gads-header h2 { font-size:22px; font-weight:700; color:#e6edf3; }
  .gads-badge { background:#1a1d28; padding:4px 12px; border-radius:20px; font-size:12px; color:#b8956a; border:1px solid rgba(184,149,106,.3); }
  .gads-section { margin-bottom:32px; }
  .gads-section-title { color:#b8956a; font-size:15px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .gads-section-title .count-pill { font-size:11px; background:rgba(184,149,106,.1); color:#b8956a; padding:2px 8px; border-radius:10px; font-weight:500; }

  /* Campaign grid */
  .campaign-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px; }
  .campaign-card { background:#1a1d28; border:1px solid #30363d; border-radius:12px; padding:16px; transition:border-color .2s; }
  .campaign-card.enabled { border-left:3px solid #b8956a; }
  .campaign-card.paused { border-left:3px solid #8b949e; }
  .campaign-card.removed { border-left:3px solid #f85149; opacity:.75; }
  .campaign-card:hover { border-color:#b8956a; }
  .campaign-card-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:12px; }
  .campaign-name { font-size:13px; font-weight:600; color:#e6edf3; flex:1; line-height:1.4; }
  .campaign-type { font-size:10px; color:#8b949e; margin-top:2px; }
  .campaign-status { font-size:10px; padding:3px 8px; border-radius:6px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
  .campaign-status.ENABLED { background:rgba(184,149,106,.2); color:#b8956a; }
  .campaign-status.PAUSED { background:rgba(139,148,158,.15); color:#8b949e; }
  .campaign-status.REMOVED { background:rgba(248,81,73,.15); color:#f85149; }
  .campaign-metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .metric { text-align:center; }
  .metric label { font-size:10px; color:#8b949e; text-transform:uppercase; letter-spacing:.3px; display:block; margin-bottom:2px; }
  .metric .value { font-size:14px; font-weight:600; color:#e6edf3; }
  .metric .value.spend { color:#b8956a; }
  .metric .value.conversions { color:#3fb950; }

  /* Keyword table */
  .keyword-table-wrap { background:#1a1d28; border:1px solid #30363d; border-radius:12px; overflow:hidden; }
  .keyword-table-wrap table { width:100%; border-collapse:collapse; font-size:13px; }
  .keyword-table-wrap th { padding:10px 14px; text-align:left; font-size:11px; font-weight:600; color:#8b949e; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid #30363d; background:#161b22; white-space:nowrap; cursor:pointer; user-select:none; }
  .keyword-table-wrap th:hover { color:#b8956a; }
  .keyword-table-wrap td { padding:9px 14px; border-bottom:1px solid rgba(48,54,61,.5); color:#e6edf3; }
  .keyword-table-wrap tr:last-child td { border-bottom:none; }
  .keyword-table-wrap tr:hover td { background:rgba(184,149,106,.04); }
  .kw-match { font-size:10px; color:#8b949e; background:#0d1117; padding:1px 6px; border-radius:4px; }
  td.good-ctr { color:#3fb950; font-weight:600; }
  td.wasted-kw { color:#f85149; }
  .sort-arrow { font-size:10px; color:#b8956a; margin-left:4px; }

  /* Daily chart */
  .chart-wrap { background:#1a1d28; border:1px solid #30363d; border-radius:12px; padding:20px; }

  /* Search terms grid */
  .search-terms-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:10px; }
  .search-term-card { background:#1a1d28; border:1px solid #30363d; border-radius:10px; padding:12px 14px; }
  .search-term-card.wasted { border-color:rgba(248,81,73,.4); background:rgba(248,81,73,.05); }
  .search-term-card .term-text { font-size:14px; font-weight:600; color:#e6edf3; margin-bottom:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .wasted-badge { font-size:10px; background:rgba(248,81,73,.2); color:#f85149; padding:2px 7px; border-radius:5px; font-weight:600; white-space:nowrap; }
  .search-term-card .term-meta { display:flex; gap:12px; font-size:12px; color:#8b949e; flex-wrap:wrap; }
  .term-meta span { white-space:nowrap; }
  .term-meta .cost-val { color:#b8956a; font-weight:600; }

  /* Insights panel */
  .insights-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; }
  .insight-card { background:#1a1d28; border:1px solid #30363d; border-radius:12px; padding:18px; }
  .insight-card h4 { font-size:11px; color:#8b949e; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
  .insight-card .ins-value { font-size:24px; font-weight:700; color:#b8956a; margin-bottom:4px; }
  .insight-card .ins-sub { font-size:12px; color:#8b949e; }
  .insight-card.alert { border-color:rgba(248,81,73,.3); }
  .insight-card.alert .ins-value { color:#f85149; }
  .insight-card.positive .ins-value { color:#3fb950; }

  @media(max-width:768px) {
    .campaign-grid { grid-template-columns:1fr; }
    .campaign-metrics { grid-template-columns:repeat(3,1fr); }
    .insights-grid { grid-template-columns:repeat(2,1fr); }
    .search-terms-grid { grid-template-columns:1fr 1fr; }
    .keyword-table-wrap { overflow-x:auto; }
  }
  @media(max-width:480px) {
    .campaign-metrics { grid-template-columns:repeat(2,1fr); }
    .insights-grid { grid-template-columns:1fr 1fr; }
    .search-terms-grid { grid-template-columns:1fr; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h1>⚡ <span>Ops Dashboard</span> — Project Board</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchBoard('crown')">👑 Crown Office</button>
    <button class="tab" onclick="switchBoard('shirtsy')">👕 Shirtsy</button>
    <button class="tab" onclick="switchBoard('goodneon')">💡 GoodNeon</button>
    <button class="tab" onclick="switchBoard('lux')">✨ Lux Neon</button>
    <button class="tab" onclick="switchBoard('luxdo')" style="border-color:#3b82f6;color:#3b82f6">🇩🇴 Lux Neon DR</button>
    <button class="tab" onclick="switchBoard('coconut')">🥥 Coconut Bikini</button>
    <button class="tab" onclick="switchBoard('reclaimed')">♻️ Reclaimed Closet</button>
    <button class="tab" onclick="switchBoard('virtus')" style="border-color:#d4a017;color:#d4a017">🏠 Virtus Realty</button>
    <button class="tab" onclick="switchBoard('system')" style="border-color:#ff6b6b;color:#ff6b6b">⚙️ System Config</button>
    <button class="tab" onclick="switchBoard('memory')" style="border-color:#b8956a;color:#b8956a">🧠 Memory</button>
    <button class="tab" onclick="switchBoard('googleads')" style="border-color:#4285f4;color:#4285f4">📊 Google Ads</button>
  </div>
</header>

<div id="board-crown" class="board active"></div>
<div id="board-shirtsy" class="board"></div>
<div id="board-goodneon" class="board"></div>
<div id="board-lux" class="board"></div>
<div id="board-luxdo" class="board"></div>
<div id="board-coconut" class="board"></div>
<div id="board-reclaimed" class="board"></div>
<div id="board-virtus" class="board"></div>
<div id="board-system" class="board"></div>
<div id="board-memory" class="board"></div>
<div id="board-googleads" class="board"></div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const projects = {
  crown: {
    name: "Crown Office Supplies",
    icon: "👑",
    url: "crownofficesupplies.com",
    baseline: { ttfb: "130ms", total: "240ms", size: "347 KB", platform: "WordPress + WooCommerce" },
    tasks: [
      {
        id: "crown-1",
        title: "Install WP Caching Plugin",
        priority: "critical",
        category: "speed",
        status: "done",
        impact: "TTFB from 1.1s → ~0.2s (5x faster)",
        description: "The origin server takes 1.1 seconds to respond because WordPress generates every page from scratch. A caching plugin stores pre-built HTML so the server responds instantly.",
        steps: [
          "Log into WordPress admin → Plugins → Add New",
          "Search for 'LiteSpeed Cache' or 'WP Rocket' (paid, but best) or 'W3 Total Cache' (free)",
          "Install and activate the plugin",
          "Enable Page Cache in plugin settings",
          "Enable Object Cache if Redis/Memcached is available on hosting",
          "Enable Browser Cache",
          "Test: visit the homepage twice — second load should be under 300ms"
        ],
        expected: "TTFB drops from 1.1s to under 0.2s. This is the single biggest win.",
        risk: "Low risk. Caching plugins are standard WP practice. If something looks broken, deactivate the plugin to instantly revert."
      },
      {
        id: "crown-2",
        title: "Fix Cloudflare Cache Settings",
        priority: "critical",
        category: "speed",
        status: "done",
        completedDate: "2026-03-24",
        impact: "Edge-cached pages load in ~130ms globally, user pages protected",
        description: "COMPLETED 3/24: Smart Cache Rule via rulesets API (PUT). Caches public pages (edge TTL 2h, browser TTL 5min) while excluding: /wp-admin, /wp-login, /cart, /checkout, /my-account, /client-dashboard, /account, /login, lost-password, register. Also checks wordpress_logged_in and wp-woocommerce_session cookies. ⚠️ Initial attempt with Page Rules 'Cache Everything' caused critical bug — cached user account pages served to other users. Fixed same day by switching to Cache Rules with proper exclusions. Ruleset: 2e76a25efc224be08c9e8f7c1f072258.",
        steps: [
          "✅ Cache Rule created via API (rulesets PUT endpoint)",
          "✅ Excludes all user-specific paths + logged-in cookies",
          "✅ Homepage: HIT, /my-account/: DYNAMIC, /client-dashboard/: DYNAMIC",
          "⚠️ LESSON: Never use Page Rules 'Cache Everything' on WooCommerce — always use Cache Rules with exclusions"
        ],
        expected: "Static pages served from Cloudflare edge (~130ms). Dynamic pages (cart, checkout, admin, my-account) always hit origin.",
        risk: "RESOLVED. Cache Rules with cookie-aware exclusions prevent user data leaks."
      },
      {
        id: "crown-3",
        title: "Optimize Product Images",
        priority: "high",
        category: "speed",
        status: "todo",
        impact: "Page weight reduced 40-60%, faster mobile loads",
        description: "Homepage is 353KB HTML alone. With images it's likely 2-5MB. Unoptimized product images are a major drag on mobile performance and hurt Core Web Vitals (LCP).",
        steps: [
          "Install 'ShortPixel' or 'Smush' plugin in WordPress",
          "Run bulk optimization on all existing media library images",
          "Enable WebP conversion (modern format, 25-35% smaller)",
          "Enable lazy loading for below-the-fold images",
          "Set max upload dimensions (e.g., 1200px wide for product images)",

function getLexTasks(projectKey) { return (lexTasks[projectKey] || []).filter(t => !t.completed); }
function getLexTasksDone(projectKey) { return (lexTasks[projectKey] || []).filter(t => t.completed); }
function completeLexTask(projectKey, taskId) {
  if (!lexTasks[projectKey]) return;
  const t = lexTasks[projectKey].find(x => x.id === taskId);
  if (t) { t.completed = true; t.completedAt = new Date().toISOString(); }
  saveLexTasks();
  renderAllBoards();
  showToast('✅ Nice work, Lex!');
}
function reopenLexTask(projectKey, taskId) {
  if (!lexTasks[projectKey]) return;
  const t = lexTasks[projectKey].find(x => x.id === taskId);
  if (t) { t.completed = false; delete t.completedAt; }
  saveLexTasks();
  renderAllBoards();
}
function addLexTask(projectKey, title, description, priority) {
  if (!lexTasks[projectKey]) lexTasks[projectKey] = [];
  lexTasks[projectKey].push({
    id: 'lex-' + Date.now(),
    title: title,
    description: description || '',
    priority: priority || 'medium',
    completed: false,
    createdAt: new Date().toISOString(),
    addedBy: 'jackie'
  });
  saveLexTasks();
}

const GIST_ID = '1d08fe33b525435f950f756847fc3fbb';

function getGHToken() {
  let tk = localStorage.getItem('gh_sync_token');
  if (!tk) {
    tk = prompt('Paste your GitHub token to enable Jackie sync (stored locally, one-time):');
    if (tk) localStorage.setItem('gh_sync_token', tk);
  }
  return tk;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function syncQueueToGist() {
  const tk = getGHToken();
  if (!tk) { showToast('❌ No token — sync disabled'); return; }
  const allTasks = [];
  for (const key of Object.keys(projects)) {
    for (const t of projects[key].tasks) {
      if (getStatus(t.id) === 'execute') {
        allTasks.push({ id: t.id, title: t.title, project: key, priority: t.priority, queuedAt: new Date().toISOString() });
      }
    }
  }
  try {
    const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${tk}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'queue.json': { content: JSON.stringify({ tasks: allTasks, lastUpdated: new Date().toISOString() }, null, 2) } } })
    });
    if (!resp.ok) { localStorage.removeItem('gh_sync_token'); showToast('❌ Sync failed — try again'); }
  } catch(e) { console.error('Queue sync failed:', e); }
}

function renderAllBoards() {
  renderBoard('crown'); renderBoard('shirtsy'); renderBoard('goodneon');
  renderBoard('lux'); renderBoard('luxdo'); renderBoard('coconut'); renderBoard('reclaimed'); renderBoard('virtus');
  renderBoard('system');
}

// On load, check gist for Lex tasks Jackie may have added
async function pullLexTasksFromGist() {
  const tk = localStorage.getItem('gh_sync_token');
  // Try authenticated first, fall back to public gist access
  const headers = tk ? { 'Authorization': `token ${tk}` } : {};
  try {
    const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, { headers });
    if (!resp.ok) return;
    const data = await resp.json();
    const lexFile = data.files && data.files['lex-tasks.json'];
    if (!lexFile) return;
    const remote = JSON.parse(lexFile.content);
    if (remote && remote.tasks) {
      let changed = false;
      // Sync completion status from localStorage back to remote tasks
      for (const rt of remote.tasks) {
        if (!lexTasks[rt.project]) lexTasks[rt.project] = [];
        const existing = lexTasks[rt.project].find(x => x.id === rt.id);
        if (existing) {
          // Update existing task with remote data but keep local completion status
          if (!existing.completed && rt.completed) { existing.completed = rt.completed; existing.completedAt = rt.completedAt; changed = true; }
          continue;
        }
        if (!lexTasks[rt.project].find(x => x.id === rt.id)) {
          lexTasks[rt.project].push(rt);
          changed = true;
        }
      }
      if (changed) { saveLexTasks(); renderAllBoards(); showToast('📥 New tasks from Jackie!'); }
    }
  } catch(e) { console.error('Pull lex tasks failed:', e); }
}

async function pushLexTaskToGist(task) {
  const tk = getGHToken();
  if (!tk) return;
  try {
    // Read current
    const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${tk}` }
    });
    const data = await resp.json();
    const lexFile = data.files && data.files['lex-tasks.json'];
    let existing = { tasks: [], lastUpdated: '' };
    if (lexFile) { try { existing = JSON.parse(lexFile.content); } catch(e) {} }
    existing.tasks.push(task);
    existing.lastUpdated = new Date().toISOString();
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${tk}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { 'lex-tasks.json': { content: JSON.stringify(existing, null, 2) } } })
    });
  } catch(e) { console.error('Push lex task failed:', e); }
}

function moveTask(id, status) {
  setStatus(id, status);
  closeModal();
  renderAllBoards();
  
  if (status === 'execute') {
    const task = findTask(id);
    showToast(`⚡ "${task.title}" sent to Jackie!`);
    syncQueueToGist();
  } else if (status === 'done') {
    const task = findTask(id);
    showToast(`✅ "${task.title}" marked done!`);
    syncQueueToGist();
  } else {
    syncQueueToGist();
  }
}

function memoryDayCard(d) {
  const levelColors = {'very-active':'#2ecc71','active':'#b8956a','moderate':'#3498db','light':'#666','empty':'#333'};
  const color = levelColors[d.activity_level] || '#666';
  const dateObj = new Date(d.date + 'T12:00:00');
  const dayName = dateObj.toLocaleDateString('en-US',{weekday:'short'});
  const monthDay = dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  
  return `<div class="memory-day-card" data-date="${d.date}" data-projects="${d.projects.join(',').toLowerCase()}" 
    onclick="openMemoryDay('${d.date}')"
    style="background:#111820;border:1px solid #1e2830;border-left:3px solid ${color};border-radius:10px;padding:16px;cursor:pointer;transition:.2s"
    onmouseover="this.style.borderColor='#b8956a'" onmouseout="this.style.borderColor='#1e2830';this.style.borderLeftColor='${color}'">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>
        <span style="color:#b8956a;font-weight:700;font-size:15px">${dayName} ${monthDay}</span>
        <span style="color:#444;font-size:12px;margin-left:8px">${d.date}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="color:${color};font-size:12px;font-weight:600">${d.activity_level}</span>
        <span style="color:#666;font-size:11px">${d.word_count} words</span>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      ${d.projects.map(p => `<span style="background:rgba(184,149,106,.15);color:#b8956a;padding:2px 8px;border-radius:10px;font-size:11px">${p}</span>`).join('')}
    </div>
    <div style="color:#888;font-size:12px">
      ${d.sections.slice(0,4).map(s => `<div style="padding:2px 0;border-bottom:1px solid #0a0f14">📌 ${s.title}</div>`).join('')}
      ${d.sections.length > 4 ? `<div style="color:#555;padding-top:4px">+ ${d.sections.length - 4} more sections</div>` : ''}
    </div>
  </div>`;
}

function openMemoryDay(date) {
  const day = memoryData.days.find(d => d.date === date);
  if (!day) return;
  const dateObj = new Date(date + 'T12:00:00');
  const fullDate = dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  
  // Identify code/technical sections
  const hasCodeSections = day.sections.some(s => s.content.some(c => c.match(/^`(?:\`\`\`[a-z]*)?|\s*[/\$].*|\s*function\s|\s*\$\{/) || c.length > 800));
  
  document.getElementById('modal-title').textContent = `🧠 ${fullDate}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);">
      <h3 style="color:var(--text);font-size:18px;margin:0 0 8px 0;">${fullDate}</h3>
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)">
        <span style="background:var(--bg);padding:4px 10px;border-radius:6px;border:1px solid var(--border)">
          <strong style="color:var(--accent)">${day.word_count}</strong> words
        </span>
        <span style="background:var(--bg);padding:4px 10px;border-radius:6px;border:1px solid var(--border)">
          <strong style="color:var(--accent)">${day.section_count}</strong> sections
        </span>
        <span style="background:${day.activity_level === 'very-active' ? 'rgba(62,185,80,0.15)' : day.activity_level === 'active' ? 'rgba(184,149,106,0.15)' : 'rgba(88,166,255,0.15)'};padding:4px 10px;border-radius:6px;border:1px solid ${day.activity_level === 'very-active' ? 'rgba(62,185,80,0.3)' : day.activity_level === 'active' ? 'rgba(184,149,106,0.3)' : 'rgba(88,166,255,0.3)'};color:${day.activity_level === 'very-active' ? 'var(--green)' : day.activity_level === 'active' ? '#b8956a' : 'var(--accent)'};font-weight:600;text-transform:capitalize">
          ${day.activity_level}
        </span>
      </div>
    </div>
    
    ${day.projects.length > 0 ? `
      <div style="margin-bottom:20px;padding:12px;background:rgba(184,149,106,0.05);border:1px solid rgba(184,149,106,0.2);border-radius:8px">
        <div style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">🏢 Projects Discussed</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${day.projects.map(p => `<span style="background:rgba(184,149,106,.15);color:#b8956a;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500">${p}</span>`).join('')}</div>
      </div>
    ` : ''}
    
    <div style="display:grid;gap:24px">${day.sections.map(s => `
      <div style="${hasCodeSections && s.content.some(c => c.match(/^(?:```[a-z]*)?|\s*[/\$].*|\s*function\s|\s*\$\{/) || s.content.join('').length > 800) ? 'background:#0d1117;padding:16px;border-radius:8px;border:1px solid var(--border);' : ''}">
        <h4 style="color:#b8956a;font-size:15px;font-weight:600;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid rgba(184,149,106,0.2);display:flex;align-items:center;gap:8px">${s.title}</h4>
        <div style="color:#e6edf3;font-size:14px;line-height:1.8">${s.content.filter(c=>c).map(c => {
          if(c.startsWith('- ')) return '<div style="padding:6px 0;border-left:2px solid #b8956a;margin:4px 0;padding-left:8px">'+c.substring(2)+'</div>';
          if(c.startsWith('### ')) return '<div style="color:#b8956a;font-weight:600;margin-top:12px;margin-bottom:4px">'+c.substring(4)+'</div>';
          if(c.match(/^`(?:```[a-z]*)?|^\s*[/\$].*|^\s*function\s|^\s*\$\{/) || c.length > 800) return '<div style="background:#0a0f14;padding:12px;border-radius:6px;border:1px solid #30363d;font-family:monospace;font-size:13px;color:#7ee787;overflow-x:auto;white-space:pre-wrap;margin:6px 0">'+c+'</div>';
          return '<div>'+c+'</div>';
        }).join('')}</div>
      </div>
    `).join('')}</div>
  `;
  document.getElementById('modal-footer').innerHTML = '<button class="btn btn-outline" onclick="closeModal()">Close</button>';
  document.getElementById('modal').classList.add('open');
}

function searchMemory(query) {
  const results = document.getElementById('memory-search-results');
  if (!query || query.length < 2) { results.innerHTML = ''; return; }
  query = query.toLowerCase();
  let matches = [];
  for (const day of memoryData.days) {
    for (const s of day.sections) {
      const fullText = s.title + ' ' + s.content.join(' ');
      if (fullText.toLowerCase().includes(query)) {
        const snippet = s.content.find(c => c.toLowerCase().includes(query)) || s.title;
        matches.push({date: day.date, title: s.title, snippet: snippet.substring(0,120)});
      }
    }
  }
  if (matches.length === 0) { results.innerHTML = '<div style="color:#666;font-size:12px;padding:8px">No results</div>'; return; }
  results.innerHTML = matches.slice(0,15).map(m => `
    <div onclick="openMemoryDay('${m.date}')" style="padding:8px;border-bottom:1px solid #1a1a1a;cursor:pointer;font-size:12px" 
      onmouseover="this.style.background='#1e2830'" onmouseout="this.style.background='transparent'">
      <div style="color:#b8956a;font-weight:600">${m.date} — ${m.title}</div>
      <div style="color:#888">${m.snippet}...</div>
    </div>
  `).join('');
}

function filterMemory(project, btn) {
  document.querySelectorAll('.mem-filter').forEach(b => {b.style.background='transparent';b.style.color='#888';b.style.border='1px solid #333';});
  btn.style.background='#b8956a';btn.style.color='#000';btn.style.border='none';
  document.querySelectorAll('.memory-day-card').forEach(card => {
    if (project === 'all') { card.style.display = ''; return; }
    const projects = card.dataset.projects;
    card.style.display = projects.includes(project.toLowerCase()) ? '' : 'none';
  });
}

// Google Ads Board Rendering
const GADS_WASTED_KEYWORDS = ["good neon", "miller lite", "free", "tony", "modulex", "neon kings", "generator"];
function isWastedTerm(term) {
  const t = term.toLowerCase();
  return GADS_WASTED_KEYWORDS.some(w => t.includes(w));
}

let gadsChartInstance = null;
let gadsSortCol = 'cost';
let gadsSortDir = -1; // -1 = desc

function renderGoogleAdsBoard() {
  const board = document.getElementById('board-googleads');
  if (!board) return;

  const { campaigns, keywords, daily, searchTerms, account } = googleAdsData;

  // ── Section 1: Campaign Cards ──────────────────────────
  const activeCampaigns = campaigns.filter(c => c.status !== 'REMOVED' || c.cost > 0);
  const campaignCardsHTML = campaigns.map(c => `
    <div class="campaign-card ${c.status.toLowerCase()}">
      <div class="campaign-card-header">
        <div>
          <div class="campaign-name">${c.name}</div>
          <div class="campaign-type">${c.type}</div>
        </div>
        <span class="campaign-status ${c.status}">${c.status}</span>
      </div>
      <div class="campaign-metrics">
        <div class="metric"><label>Budget/day</label><span class="value">$${c.budget.toFixed(2)}</span></div>
        <div class="metric"><label>Total Spend</label><span class="value spend">$${c.cost.toFixed(2)}</span></div>
        <div class="metric"><label>Impressions</label><span class="value">${c.impressions.toLocaleString()}</span></div>
        <div class="metric"><label>Clicks</label><span class="value">${c.clicks.toLocaleString()}</span></div>
        <div class="metric"><label>CTR</label><span class="value">${c.ctr.toFixed(2)}%</span></div>
        <div class="metric"><label>CPC</label><span class="value">$${c.cpc.toFixed(2)}</span></div>
        <div class="metric"><label>Conv.</label><span class="value conversions">${c.conversions}</span></div>
      </div>
    </div>
  `).join('');

  // ── Section 2: Keyword Table ───────────────────────────
  function renderKeywordRows(sortCol, sortDir) {
    const sorted = [...keywords].sort((a,b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
      return av < bv ? sortDir : av > bv ? -sortDir : 0;
    });
    return sorted.map(k => {
      const isWasted = k.cost > 0 && k.clicks === 0;
      return `<tr>
        <td style="font-weight:500">${k.keyword}</td>
        <td><span class="kw-match">${k.matchType}</span></td>
        <td>${k.impressions.toLocaleString()}</td>
        <td>${k.clicks.toLocaleString()}</td>
        <td class="${k.ctr > 5 ? 'good-ctr' : ''}">${k.ctr.toFixed(2)}%</td>
        <td>$${k.cpc.toFixed(2)}</td>
        <td class="${isWasted ? 'wasted-kw' : ''}">$${k.cost.toFixed(2)}</td>
      </tr>`;
    }).join('');
  }

  function sortArrow(col) {
    if (col !== gadsSortCol) return '';
    return `<span class="sort-arrow">${gadsSortDir === -1 ? '▼' : '▲'}</span>`;
  }

  const keywordTableHTML = `
    <div class="keyword-table-wrap">
      <table id="gads-kw-table">
        <thead>
          <tr>
            <th onclick="gadsSort('keyword')">Keyword${sortArrow('keyword')}</th>
            <th onclick="gadsSort('matchType')">Match${sortArrow('matchType')}</th>
            <th onclick="gadsSort('impressions')">Impr.${sortArrow('impressions')}</th>
            <th onclick="gadsSort('clicks')">Clicks${sortArrow('clicks')}</th>
            <th onclick="gadsSort('ctr')">CTR${sortArrow('ctr')}</th>
            <th onclick="gadsSort('cpc')">CPC${sortArrow('cpc')}</th>
            <th onclick="gadsSort('cost')">Cost${sortArrow('cost')}</th>
          </tr>
        </thead>
        <tbody id="gads-kw-tbody">
          ${renderKeywordRows(gadsSortCol, gadsSortDir)}
        </tbody>
      </table>
    </div>
  `;

  // ── Section 3: Daily Chart (built after innerHTML) ─────

  // ── Section 4: Search Terms ────────────────────────────
  const annotatedTerms = searchTerms.map(t => ({ ...t, wasted: isWastedTerm(t.term) }));
  const wastedTerms = annotatedTerms.filter(t => t.wasted && t.cost > 0);
  const searchTermsHTML = annotatedTerms.map(t => `
    <div class="search-term-card ${t.wasted ? 'wasted' : ''}">
      <div class="term-text">
        ${t.term}
        ${t.wasted ? '<span class="wasted-badge">⚠️ Wasted</span>' : ''}
      </div>
      <div class="term-meta">
        <span>${t.impressions.toLocaleString()} imp</span>
        <span>${t.clicks} clicks</span>
        <span>${t.ctr.toFixed(1)}% CTR</span>
        <span class="cost-val">$${t.cost.toFixed(2)}</span>
      </div>
    </div>
  `).join('');

  // ── Section 5: Insights ────────────────────────────────
  const kwWithClicks = keywords.filter(k => k.clicks > 0);
  const topCtrKw = [...kwWithClicks].sort((a,b) => b.ctr - a.ctr)[0];
  const topCpcKw = [...kwWithClicks].sort((a,b) => b.cpc - a.cpc)[0];
  const wastedSpend = wastedTerms.reduce((s,t) => s + t.cost, 0);
  // Budget utilization: sum of (cost / (budget * estimated days active))
  // Use a simpler proxy: actual spend vs total budget capacity (budget * 30 days for active)
  const activeCost = campaigns.filter(c => c.status === 'ENABLED').reduce((s,c) => s + c.cost, 0);
  const activeBudget = campaigns.filter(c => c.status === 'ENABLED').reduce((s,c) => s + c.budget, 0);
  const budgetUtil = activeBudget > 0 ? ((activeCost / (activeBudget * 30)) * 100).toFixed(1) : 'N/A';
  const ALL_TIME_SPEND = 5644;

  const insightsHTML = `
    <div class="insight-card positive">
      <h4>🏆 Top Keyword by CTR</h4>
      <div class="ins-value">${topCtrKw ? topCtrKw.ctr.toFixed(2) + '%' : 'N/A'}</div>
      <div class="ins-sub">${topCtrKw ? topCtrKw.keyword : '—'}</div>
    </div>
    <div class="insight-card">
      <h4>💸 Priciest Keyword (CPC)</h4>
      <div class="ins-value">$${topCpcKw ? topCpcKw.cpc.toFixed(2) : '0.00'}</div>
      <div class="ins-sub">${topCpcKw ? topCpcKw.keyword : '—'}</div>
    </div>
    <div class="insight-card alert">
      <h4>⚠️ Est. Wasted Spend</h4>
      <div class="ins-value">$${wastedSpend.toFixed(2)}</div>
      <div class="ins-sub">${wastedTerms.length} irrelevant search term${wastedTerms.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="insight-card">
      <h4>📊 Budget Utilization</h4>
      <div class="ins-value">${budgetUtil}${budgetUtil !== 'N/A' ? '%' : ''}</div>
      <div class="ins-sub">Active campaigns vs 30-day budget</div>
    </div>
    <div class="insight-card">
      <h4>💰 All-Time Spend</h4>
      <div class="ins-value">$${ALL_TIME_SPEND.toLocaleString()}</div>
      <div class="ins-sub">Across all campaigns, all time</div>
    </div>
  `;

  // ── Build Board HTML ───────────────────────────────────
  board.innerHTML = `
    <div style="padding:24px 32px; max-width:100%;">
      <div class="gads-header">
        <h2>📊 Google Ads Performance</h2>
        <span class="gads-badge">${account.name}</span>
        <span class="gads-badge">${campaigns.length} campaigns</span>
        <span class="gads-badge" style="color:#8b949e">Updated ${new Date(googleAdsData.generatedAt).toLocaleString()}</span>
      </div>

      <!-- Section 1: Campaign Overview -->
      <div class="gads-section">
        <div class="gads-section-title">
          🗂️ Campaign Overview
          <span class="count-pill">${campaigns.length} campaigns</span>
        </div>
        <div class="campaign-grid">${campaignCardsHTML}</div>
      </div>

      <!-- Section 2: Keyword Performance -->
      <div class="gads-section">
        <div class="gads-section-title">
          🎯 Keyword Performance
          <span class="count-pill">${keywords.length} keywords</span>
          <span style="font-size:11px;color:#8b949e;font-weight:400">Click headers to sort · <span style="color:#3fb950">Green</span> = CTR &gt; 5% · <span style="color:#f85149">Red</span> = Spend with 0 clicks</span>
        </div>
        ${keywordTableHTML}
      </div>

      <!-- Section 3: Daily Chart -->
      <div class="gads-section">
        <div class="gads-section-title">📈 Daily Performance</div>
        <div class="chart-wrap">
          <canvas id="gads-daily-chart" style="width:100%;height:280px;"></canvas>
        </div>
      </div>

      <!-- Section 4: Search Terms -->
      <div class="gads-section">
        <div class="gads-section-title">
          🔍 Search Terms Analysis
          <span class="count-pill">${searchTerms.length} terms</span>
          <span style="font-size:11px;color:#8b949e;font-weight:400">${wastedTerms.length} flagged as wasted spend</span>
        </div>
        <div class="search-terms-grid">${searchTermsHTML}</div>
      </div>

      <!-- Section 5: Quick Insights -->
      <div class="gads-section">
        <div class="gads-section-title">💡 Quick Insights</div>
        <div class="insights-grid">${insightsHTML}</div>
      </div>
    </div>
  `;

  // ── Sort function (updates tbody only) ────────────────
  window.gadsSort = function(col) {
    if (gadsSortCol === col) {
      gadsSortDir *= -1;
    } else {
      gadsSortCol = col;
      gadsSortDir = col === 'keyword' || col === 'matchType' ? 1 : -1;
    }
    // Update header arrows
    const table = document.getElementById('gads-kw-table');
    if (!table) return;
    table.querySelectorAll('th').forEach(th => {
      th.innerHTML = th.innerHTML.replace(/<span class="sort-arrow">.*?<\/span>/g, '');
    });
    const cols = ['keyword','matchType','impressions','clicks','ctr','cpc','cost'];
    const thIdx = cols.indexOf(gadsSortCol);
    if (thIdx >= 0) {
      const ths = table.querySelectorAll('th');
      ths[thIdx].innerHTML += `<span class="sort-arrow">${gadsSortDir === -1 ? '▼' : '▲'}</span>`;
    }
    const tbody = document.getElementById('gads-kw-tbody');
    if (tbody) tbody.innerHTML = renderKeywordRows(gadsSortCol, gadsSortDir);
  };

  // ── Render Chart ───────────────────────────────────────
  if (gadsChartInstance) { gadsChartInstance.destroy(); gadsChartInstance = null; }
  const canvas = document.getElementById('gads-daily-chart');
  if (canvas && daily && daily.length > 0) {
    // Sort daily data by date ascending
    const sortedDaily = [...daily].sort((a,b) => a.date.localeCompare(b.date));
    const ctx = canvas.getContext('2d');
    gadsChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: sortedDaily.map(d => d.date.slice(5)), // "MM-DD"
        datasets: [
          {
            label: 'Impressions',
            data: sortedDaily.map(d => d.impressions),
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.08)',
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: false,
            yAxisID: 'y'
          },
          {
            label: 'Clicks',
            data: sortedDaily.map(d => d.clicks),
            borderColor: '#3fb950',
            backgroundColor: 'rgba(63,185,80,0.08)',
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: false,
            yAxisID: 'y'
          },
          {
            label: 'Spend ($)',
            data: sortedDaily.map(d => d.cost),
            borderColor: '#b8956a',
            backgroundColor: 'rgba(184,149,106,0.08)',
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
            fill: false,
            yAxisID: 'y1'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: { color: '#8b949e', font: { size: 12 }, padding: 16 }
          },
          tooltip: {
            backgroundColor: '#1a1d28',
            borderColor: '#30363d',
            borderWidth: 1,
            titleColor: '#e6edf3',
            bodyColor: '#8b949e'
          }
        },
        scales: {
          x: {
            ticks: { color: '#8b949e', font: { size: 11 } },
            grid: { color: 'rgba(48,54,61,0.6)' }
          },
          y: {
            ticks: { color: '#8b949e', font: { size: 11 } },
            grid: { color: 'rgba(48,54,61,0.6)' },
            title: { display: true, text: 'Impressions / Clicks', color: '#8b949e', font: { size: 11 } }
          },
          y1: {
            position: 'right',
            ticks: {
              color: '#b8956a',
              font: { size: 11 },
              callback: v => '$' + v.toFixed(0)
            },
            grid: { drawOnChartArea: false },
            title: { display: true, text: 'Spend ($)', color: '#b8956a', font: { size: 11 } }
          }
        }
      }
    });
  }
}
